name: personal-assistant
title: Personal assistant (mixed instruction + prose)
domain_tags:
  - personal
  - general
recommended_base: qwen2.5-1.5b
expected_steps: 900
expected_duration:
  cuda-sm80+: "~7 min"
  mps: "~20 min"
  cpu: "~2.5 hr"
summary: |
  Knows your preferences, your projects, and how you like things
  phrased. Mix of prose (context about you) and instruction (how to
  respond). The most personal of the starter templates.
sample_prompts:
  - "Rewrite this in my voice: ..."
  - "When someone says 'can you sync?', what do they mean?"
